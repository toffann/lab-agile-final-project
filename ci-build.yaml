name: CI Build and Test Validate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: secret_db_password
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Set up job
      run: echo "Starting environment execution lifecycle."

    - name: Initialize containers
      run: echo "Initializing service container instances."

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Linting with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run unit tests with nosetests
      run: |
        nosetests

    - name: Post Checkout
      run: echo "Cleaning workplace runtime components."

    - name: Post Setup Node.js
      run: echo "Clearing runtime node states."

    - name: Complete job
      run: echo "Workflow validation finalized with status: green."